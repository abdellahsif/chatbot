<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatbot Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #f8f4ec;
      --bg-2: #c9e6dc;
      --ink: #1c2a2f;
      --ink-soft: #3b4f56;
      --accent: #d65a31;
      --accent-2: #117a65;
      --card: rgba(255, 255, 255, 0.82);
      --border: rgba(28, 42, 47, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, #fff3cc 0, transparent 35%),
        radial-gradient(circle at 87% 18%, #e5f4ef 0, transparent 38%),
        linear-gradient(130deg, var(--bg-1) 0%, var(--bg-2) 100%);
      animation: settle 600ms ease-out;
    }

    @keyframes settle {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .wrap {
      width: min(1080px, 94vw);
      margin: 24px auto;
      display: grid;
      gap: 16px;
      grid-template-columns: 320px 1fr;
    }

    .panel {
      background: var(--card);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 14px 40px rgba(28, 42, 47, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.6rem;
      letter-spacing: 0.02em;
    }

    p.note {
      margin: 0 0 12px;
      color: var(--ink-soft);
      font-size: 0.92rem;
    }

    .group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.88rem;
    }

    input, select, textarea, button {
      font: inherit;
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      background: white;
      color: var(--ink);
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .row {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      border: none;
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    button.primary {
      color: #fff;
      background: linear-gradient(120deg, var(--accent), #ef8f38);
      box-shadow: 0 10px 20px rgba(214, 90, 49, 0.28);
    }

    button.secondary {
      color: #fff;
      background: linear-gradient(120deg, var(--accent-2), #1ea188);
      box-shadow: 0 10px 20px rgba(17, 122, 101, 0.25);
    }

    button:hover {
      transform: translateY(-1px);
    }

    .status {
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--ink-soft);
      min-height: 1.2rem;
    }

    .response {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .bubble {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.85);
      opacity: 0;
      transform: translateY(8px);
      animation: bubble-in 360ms ease forwards;
    }

    .bubble h3 {
      margin: 0 0 8px;
      font-size: 0.96rem;
      color: var(--ink-soft);
    }

    .bubble p {
      margin: 0;
      line-height: 1.5;
    }

    .bubble.user {
      background: rgba(214, 90, 49, 0.08);
      border-color: rgba(214, 90, 49, 0.35);
    }

    .bubble.assistant {
      background: rgba(17, 122, 101, 0.08);
      border-color: rgba(17, 122, 101, 0.3);
    }

    .chat-text {
      white-space: pre-wrap;
      line-height: 1.55;
    }

    details.evidence-block {
      margin-top: 10px;
      border-top: 1px dashed var(--border);
      padding-top: 8px;
    }

    details.evidence-block summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--ink-soft);
    }

    @keyframes bubble-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .evidence li {
      margin: 0 0 8px;
      line-height: 1.45;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.86rem;
    }

    @media (max-width: 920px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>University Matcher</h1>
      <p class="note">Fill your profile to get evidence-based school matches.</p>

      <div class="group">
        <label for="question">Optional Details</label>
        <textarea id="question" placeholder="Optional: add extra preferences (program type, schedule, language, etc.)."></textarea>
      </div>

      <div class="row">
        <div class="group">
          <label for="city">City</label>
          <input id="city" value="Rabat" />
        </div>
        <div class="group">
          <label for="country">Country</label>
          <input id="country" value="MA" />
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label for="bac">Bac Stream</label>
          <select id="bac">
            <option value="sm">Sciences Math (sm)</option>
            <option value="spc" selected>Sciences Physiques (spc)</option>
            <option value="svt">SVT (svt)</option>
            <option value="eco">Eco (eco)</option>
            <option value="lettres">Lettres (lettres)</option>
            <option value="arts">Arts (arts)</option>
          </select>
        </div>
        <div class="group">
          <label for="grade">Grade Band</label>
          <select id="grade">
            <option value="passable">Passable</option>
            <option value="bien" selected>Bien</option>
            <option value="tres_bien">Tres bien</option>
            <option value="elite">Elite</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="group">
          <label for="motivation">Motivation</label>
          <select id="motivation">
            <option value="cash">Cash (ROI)</option>
            <option value="prestige">Prestige</option>
            <option value="passion">Passion</option>
            <option value="safety">Safety</option>
            <option value="expat">Expat</option>
            <option value="employability" selected>Employability (career)</option>
          </select>
        </div>
        <div class="group">
          <label for="budget">Budget Band</label>
          <select id="budget">
            <option value="zero_public">zero_public</option>
            <option value="tight_25k">tight_25k</option>
            <option value="comfort_50k" selected>comfort_50k</option>
            <option value="no_limit_70k_plus">no_limit_70k_plus</option>
          </select>
        </div>
      </div>

      <div class="group">
        <label for="topk">Top K</label>
        <input id="topk" type="number" min="1" max="10" value="3" />
      </div>

      <div class="actions">
        <button class="primary" id="askBtn">Find Best Matches</button>
        <button class="secondary" id="clearBtn">Clear Chat</button>
      </div>

      <div class="status" id="status"></div>
    </section>

    <section class="panel response" id="responsePanel">
      <div class="bubble">
        <h3>Ready</h3>
        <p>Submit your profile to see best matches, why they fit, confidence, and evidence.</p>
      </div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const panelEl = document.getElementById("responsePanel");
    const CHAT_STORAGE_KEY = "chatbot_history_v1";
    let turnCounter = 0;
    let chatState = {
      turns: [],
    };

    const READY_HTML = `
      <div class="bubble">
        <h3>Ready</h3>
        <p>Submit your profile to see best matches, why they fit, confidence, and evidence.</p>
      </div>
    `;

    function resetChatPanel() {
      turnCounter = 0;
      panelEl.dataset.started = "0";
      panelEl.innerHTML = READY_HTML;
    }

    function loadChatState() {
      try {
        const raw = localStorage.getItem(CHAT_STORAGE_KEY);
        if (!raw) {
          return { turns: [] };
        }
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.turns)) {
          return { turns: [] };
        }
        return {
          turns: parsed.turns.filter((t) => t && typeof t === "object"),
        };
      } catch {
        return { turns: [] };
      }
    }

    function saveChatState() {
      localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chatState));
    }

    function clearChatState() {
      chatState = { turns: [] };
      localStorage.removeItem(CHAT_STORAGE_KEY);
    }

    function buildBackendChatHistory() {
      const turns = Array.isArray(chatState.turns) ? chatState.turns : [];
      const recentTurns = turns.slice(-8);
      const messages = [];
      for (const turn of recentTurns) {
        const q = String(turn.question || "").trim();
        const a = String((turn.response && (turn.response.message_paragraph || buildAssistantMessage(turn.response))) || "").trim();
        if (q) {
          messages.push({ role: "user", content: q });
        }
        if (a) {
          messages.push({ role: "assistant", content: a });
        }
      }
      return messages;
    }

    function ensureChatStarted() {
      if (panelEl.dataset.started === "1") {
        return;
      }
      panelEl.dataset.started = "1";
      panelEl.innerHTML = "";
    }

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function escapeHtml(v) {
      return String(v)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function hasProfileSignal(profile) {
      return Boolean(
        profile &&
          [
            profile.bac_stream,
            profile.expected_grade_band,
            profile.motivation,
            profile.budget_band,
            profile.city,
            profile.country,
          ].some((value) => String(value || "").trim())
      );
    }

    function buildProfileRequestSummary(profile) {
      const bacLabel = {
        sm: "sciences_math",
        spc: "sciences_physiques",
        svt: "svt",
        eco: "eco",
        lettres: "lettres",
        arts: "arts",
      };
      const gradeLabel = {
        passable: "passable",
        bien: "bien",
        tres_bien: "tres_bien",
        elite: "elite",
      };
      const motivationLabel = {
        cash: "cash",
        prestige: "prestige",
        passion: "passion",
        safety: "safety",
        expat: "expat",
        employability: "career",
      };
      const parts = [];
      if (profile.bac_stream) parts.push(`bac=${bacLabel[profile.bac_stream] || profile.bac_stream}`);
      if (profile.expected_grade_band) parts.push(`grade=${gradeLabel[profile.expected_grade_band] || profile.expected_grade_band}`);
      if (profile.motivation) parts.push(`motivation=${motivationLabel[profile.motivation] || profile.motivation}`);
      if (profile.budget_band) parts.push(`budget=${profile.budget_band}`);
      if (profile.city) parts.push(`city=${profile.city}`);
      if (profile.country) parts.push(`country=${profile.country}`);
      return parts.length ? `Profile request (${parts.join(", ")})` : "Profile request";
    }

    function buildAssistantMessage(data) {
      const clean = (text) => {
        const raw = String(text || "").trim();
        if (!raw) {
          return "";
        }
        return raw
          .replace(/^Best match:\s*/i, "")
          .replace(/^Evidence snippet:\s*/i, "")
          .replace(/^Alternative\s+/i, "")
          .replace(/^Evidence focus:\s*/i, "")
          .trim();
      };

      if (data.message_paragraph) {
        const paragraph = clean(data.message_paragraph);
        if (paragraph) {
          return paragraph;
        }
      }

      const parts = [];
      if (data.short_answer) {
        parts.push(clean(data.short_answer));
      }
      if (data.why_it_fits) {
        parts.push(clean(data.why_it_fits));
      }
      if (data.alternative) {
        parts.push(clean(data.alternative));
      }
      if (data.next_action) {
        parts.push(clean(data.next_action));
      }
      return parts.filter(Boolean).join(" ");
    }

    function renderChatResult(data, question) {
      ensureChatStarted();
      turnCounter += 1;
      const userRequestText = String(question || "").trim() || "Profile-based recommendation request";
      const evidenceItems = Array.isArray(data.evidence)
        ? data.evidence.map((e) => `<li><strong>${escapeHtml(e.school_name || "N/A")}</strong> (${escapeHtml(e.program || "N/A")})<br/><span class="mono">score=${escapeHtml(e.score)} chunk=${escapeHtml(e.chunk_id)}</span><br/>${escapeHtml(e.text || "")}</li>`).join("")
        : "";

      const userBubble = document.createElement("div");
      userBubble.className = "bubble user";
      userBubble.innerHTML = `
        <h3>You</h3>
        <p>${escapeHtml(userRequestText)}</p>
      `;
      panelEl.appendChild(userBubble);

      const assistantBubble = document.createElement("div");
      assistantBubble.className = "bubble assistant";
      assistantBubble.innerHTML = `
        <h3>Assistant</h3>
        <p class="chat-text">${escapeHtml(buildAssistantMessage(data) || "I can help more if you share more details.")}</p>
        <details class="evidence-block">
          <summary>Show evidence</summary>
          <ul class="evidence">${evidenceItems || "<li>No evidence returned.</li>"}</ul>
        </details>
      `;
      panelEl.appendChild(assistantBubble);
      assistantBubble.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    function restoreSavedChat() {
      chatState = loadChatState();
      if (!chatState.turns.length) {
        resetChatPanel();
        return;
      }
      resetChatPanel();
      for (const turn of chatState.turns) {
        renderChatResult(turn.response || {}, turn.question || "");
      }
      setStatus("Loaded previous chat history.");
    }

    async function askChatbot() {
      const payload = {
        question: document.getElementById("question").value.trim(),
        top_k: Number(document.getElementById("topk").value || "3"),
        chat_history: buildBackendChatHistory(),
        profile: {
          bac_stream: document.getElementById("bac").value.trim(),
          expected_grade_band: document.getElementById("grade").value.trim(),
          motivation: document.getElementById("motivation").value.trim(),
          budget_band: document.getElementById("budget").value,
          city: document.getElementById("city").value.trim(),
          country: document.getElementById("country").value.trim(),
        },
      };

      if (!hasProfileSignal(payload.profile)) {
        setStatus("Please provide at least one profile field.");
        return;
      }

      const displayQuestion = payload.question || buildProfileRequestSummary(payload.profile);

      setStatus("Asking chatbot...");
      try {
        const res = await fetch("/chat/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          throw new Error(`Request failed with status ${res.status}`);
        }
        const data = await res.json();
        renderChatResult(data, displayQuestion);
        chatState.turns.push({
          question: displayQuestion,
          response: data,
        });
        if (chatState.turns.length > 30) {
          chatState.turns = chatState.turns.slice(-30);
        }
        saveChatState();
        setStatus("Done.");
      } catch (err) {
        setStatus(`Error: ${err.message}`);
      }
    }

    document.getElementById("askBtn").addEventListener("click", askChatbot);
    document.getElementById("clearBtn").addEventListener("click", () => {
      clearChatState();
      resetChatPanel();
      setStatus("Chat cleared and stored context removed.");
    });

    restoreSavedChat();
  </script>
</body>
</html>
